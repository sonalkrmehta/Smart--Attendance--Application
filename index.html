<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Attendance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .video-wrapper { 
            position: relative; 
            width: 100%; 
            padding-top: 56.25%; 
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        #webcam, #overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        #overlay { pointer-events: none; z-index: 10; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mirrored { transform: scaleX(-1); }
        
        #attendance-list::-webkit-scrollbar { width: 4px; }
        #attendance-list::-webkit-scrollbar-track { background: transparent; }
        #attendance-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">
    <nav class="p-6 border-b border-slate-800 flex justify-between items-center glass-panel sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-br from-blue-500 to-indigo-600 p-2.5 rounded-xl">
                <i class="fas fa-user-shield text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">VisionTrack <span class="text-blue-500">AI</span></h1>
        </div>
        <div id="status-container" class="flex items-center gap-2 text-xs font-bold text-green-400">
            <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> SYSTEM LIVE
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-8 space-y-6">
            <div class="video-wrapper ring-1 ring-white/10">
                <video id="webcam" autoplay playsinline class="mirrored"></video>
                <canvas id="overlay" class="mirrored"></canvas>
                <div id="capture-overlay" class="hidden absolute inset-0 bg-white z-30 opacity-40"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-4">
                <div class="glass-panel p-5 rounded-2xl">
                    <p class="text-slate-400 text-xs uppercase font-bold tracking-wider">Attendance Today</p>
                    <p id="total-count" class="text-4xl font-black mt-1">0</p>
                </div>
                <div class="glass-panel p-5 rounded-2xl">
                    <p class="text-slate-400 text-xs uppercase font-bold tracking-wider">Confidence</p>
                    <p class="text-4xl font-black mt-1 text-blue-400">99.2%</p>
                </div>
                <div class="glass-panel p-5 rounded-2xl border-l-4 border-l-blue-500">
                    <p class="text-slate-400 text-xs uppercase font-bold tracking-wider">Device</p>
                    <p class="text-sm font-bold mt-2">Active Camera</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-6">
            <div class="glass-panel p-6 rounded-2xl shadow-xl">
                <h2 class="text-lg font-bold mb-5 flex items-center gap-2">
                    <i class="fas fa-id-card text-blue-500"></i> New Enrollment
                </h2>
                <div class="space-y-4">
                    <input type="text" id="reg-name" placeholder="Full Name" 
                        class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <button onclick="captureAndRegister()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 transition-all p-4 rounded-xl font-bold flex items-center justify-center gap-2">
                        <i class="fas fa-camera"></i> Register Identity
                    </button>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-2xl shadow-xl h-[480px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold">Activity Log</h2>
                    <button onclick="fetchAttendance()" class="text-slate-400 hover:text-white transition-all">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div id="attendance-list" class="flex-1 overflow-y-auto space-y-4 pr-2">
                    <p class="text-center text-slate-600 text-sm mt-10">Initializing log...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        // Changed to 127.0.0.1 for more reliable local connectivity
        const API_BASE = "http://127.0.0.1:8000";

        async function initWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                    startRecognitionLoop();
                };
            } catch (err) {
                console.error(err);
                document.getElementById('status-container').innerText = "CAMERA ERROR";
            }
        }

        async function startRecognitionLoop() {
            setInterval(async () => {
                if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('file', blob, 'frame.jpg');

                    try {
                        const response = await fetch(`${API_BASE}/recognize`, { method: 'POST', body: formData });
                        const data = await response.json();
                        drawDetections(data.detections);
                        fetchAttendance(); 
                    } catch (e) {}
                }, 'image/jpeg', 0.5);
            }, 1000); 
        }

        function drawDetections(detections) {
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            if (!detections) return;

            detections.forEach(det => {
                const [top, right, bottom, left] = det.box;
                const isUnknown = det.name === "Unknown";
                
                ctx.strokeStyle = isUnknown ? '#ef4444' : '#3b82f6';
                ctx.lineWidth = 4;
                ctx.strokeRect(left, top, right - left, bottom - top);
                
                ctx.fillStyle = isUnknown ? '#ef4444' : '#3b82f6';
                ctx.font = 'bold 20px sans-serif';
                const label = `${det.name} ${!isUnknown ? Math.round(det.confidence * 100) + '%' : ''}`;
                ctx.fillText(label, left, top > 30 ? top - 10 : top + 30);
            });
        }

        async function captureAndRegister() {
            const name = document.getElementById('reg-name').value;
            if (!name) return alert("Please enter a name.");

            const flash = document.getElementById('capture-overlay');
            flash.classList.remove('hidden');
            setTimeout(() => flash.classList.add('hidden'), 150);

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'reg.jpg');
                
                try {
                    // Using encodeURIComponent to handle names with spaces correctly
                    const response = await fetch(`${API_BASE}/register/${encodeURIComponent(name)}`, { 
                        method: 'POST', 
                        body: formData 
                    });
                    
                    if (!response.ok) throw new Error("Network response not ok");
                    
                    const result = await response.json();
                    alert(result.message);
                    document.getElementById('reg-name').value = '';
                } catch (e) {
                    console.error(e);
                    alert("Registration signal sent. Check terminal for status.");
                }
            }, 'image/jpeg', 0.9);
        }

        async function fetchAttendance() {
            try {
                const response = await fetch(`${API_BASE}/attendance`);
                const data = await response.json();
                const list = document.getElementById('attendance-list');
                document.getElementById('total-count').innerText = data.length;
                
                if (data.length === 0) return;

                list.innerHTML = data.reverse().map(record => `
                    <div class="bg-slate-900/50 p-4 rounded-xl flex items-center justify-between border border-slate-800">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold">
                                ${record.name[0].toUpperCase()}
                            </div>
                            <div>
                                <p class="text-sm font-bold">${record.name}</p>
                                <p class="text-[10px] text-slate-500">${new Date(record.timestamp).toLocaleTimeString()}</p>
                            </div>
                        </div>
                        <span class="px-2 py-0.5 bg-green-500/10 text-green-500 text-[10px] font-bold rounded">Present</span>
                    </div>
                `).join('');
            } catch (e) {}
        }

        initWebcam();
        fetchAttendance();
    </script>
</body>
</html>
