<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Attendance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .video-container { position: relative; overflow: hidden; border-radius: 1rem; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">
    <nav class="p-6 border-b border-slate-800 flex justify-between items-center glass-panel sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i class="fas fa-user-shield text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">VisionTrack AI</h1>
        </div>
        <div class="flex gap-4">
            <span id="status-indicator" class="flex items-center gap-2 text-sm text-green-400">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> System Live
            </span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Live Camera Feed Section -->
        <div class="lg:col-span-2 space-y-6">
            <div class="video-container bg-black aspect-video flex items-center justify-center shadow-2xl ring-1 ring-slate-700">
                <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
                <canvas id="overlay"></canvas>
                <div id="capture-overlay" class="hidden absolute inset-0 bg-white opacity-20"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-4">
                <div class="glass-panel p-4 rounded-xl">
                    <p class="text-slate-400 text-xs uppercase font-bold">Today's Total</p>
                    <p id="total-count" class="text-3xl font-black mt-1">0</p>
                </div>
                <div class="glass-panel p-4 rounded-xl">
                    <p class="text-slate-400 text-xs uppercase font-bold">Accuracy</p>
                    <p class="text-3xl font-black mt-1 text-blue-400">99.4%</p>
                </div>
                <div class="glass-panel p-4 rounded-xl border-l-4 border-l-blue-500">
                    <p class="text-slate-400 text-xs uppercase font-bold">Model</p>
                    <p class="text-sm font-bold mt-2">Dlib-ResNet128</p>
                </div>
            </div>
        </div>

    
        <div class="space-y-6">
            <div class="glass-panel p-6 rounded-2xl shadow-xl">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-plus-circle text-blue-500"></i> New Enrollment
                </h2>
                <div class="space-y-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <button onclick="captureAndRegister()" class="w-full bg-blue-600 hover:bg-blue-700 transition-colors p-3 rounded-lg font-bold flex items-center justify-center gap-2">
                        <i class="fas fa-camera"></i> Capture & Register
                    </button>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-2xl shadow-xl h-[400px] flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold">Attendance Log</h2>
                    <button onclick="fetchAttendance()" class="text-slate-400 hover:text-white transition-colors">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div id="attendance-list" class="flex-1 overflow-y-auto space-y-3 pr-2 scrollbar-hide">
                    <!-- Logs dynamically added here -->
                    <p class="text-center text-slate-500 text-sm mt-10">No records yet.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        const API_BASE = "http://localhost:8000";

        async function initWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                    startRecognitionLoop();
                };
            } catch (err) {
                console.error("Webcam Error:", err);
            }
        }

        async function startRecognitionLoop() {
            setInterval(async () => {
                const offscreenCanvas = document.createElement('canvas');
                offscreenCanvas.width = video.videoWidth;
                offscreenCanvas.height = video.videoHeight;
                offscreenCanvas.getContext('2d').drawImage(video, 0, 0);
                
                offscreenCanvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('file', blob, 'frame.jpg');

                    try {
                        const response = await fetch(`${API_BASE}/recognize`, { method: 'POST', body: formData });
                        const data = await response.json();
                        drawDetections(data.detections);
                        fetchAttendance(); // Refresh log
                    } catch (e) {}
                }, 'image/jpeg', 0.6);
            }, 1500); // Process every 1.5s for performance
        }

        function drawDetections(detections) {
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            detections.forEach(det => {
                const [top, right, bottom, left] = det.box;
                const isUnknown = det.name === "Unknown";
                
                ctx.strokeStyle = isUnknown ? '#ef4444' : '#3b82f6';
                ctx.lineWidth = 3;
                ctx.strokeRect(left, top, right - left, bottom - top);
                
                ctx.fillStyle = isUnknown ? '#ef4444' : '#3b82f6';
                ctx.font = 'bold 20px Inter, sans-serif';
                ctx.fillText(`${det.name} (${Math.round(det.confidence * 100)}%)`, left, top > 30 ? top - 10 : top + 30);
            });
        }

        async function captureAndRegister() {
            const name = document.getElementById('reg-name').value;
            if (!name) return alert("Enter name first!");

            const flash = document.getElementById('capture-overlay');
            flash.classList.remove('hidden');
            setTimeout(() => flash.classList.add('hidden'), 100);

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'reg.jpg');
                const response = await fetch(`${API_BASE}/register/${name}`, { method: 'POST', body: formData });
                const result = await response.json();
                alert(result.message);
                document.getElementById('reg-name').value = '';
            }, 'image/jpeg', 0.9);
        }

        async function fetchAttendance() {
            try {
                const response = await fetch(`${API_BASE}/attendance`);
                const data = await response.json();
                const list = document.getElementById('attendance-list');
                document.getElementById('total-count').innerText = data.length;
                
                list.innerHTML = data.reverse().map(record => `
                    <div class="bg-slate-800 p-3 rounded-xl flex items-center justify-between border border-slate-700 animate-in slide-in-from-right duration-300">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-900 rounded-full flex items-center justify-center text-blue-400 font-bold">
                                ${record.name[0].toUpperCase()}
                            </div>
                            <div>
                                <p class="text-sm font-bold">${record.name}</p>
                                <p class="text-[10px] text-slate-500 uppercase tracking-widest">${new Date(record.timestamp).toLocaleTimeString()}</p>
                            </div>
                        </div>
                        <span class="px-2 py-1 bg-green-900/30 text-green-400 text-[10px] font-bold rounded uppercase">Present</span>
                    </div>
                `).join('');
            } catch (e) {}
        }

        initWebcam();
        fetchAttendance();
    </script>
</body>
</html>
